<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
        <title>Home - Magari</title>
        <link rel="stylesheet" href="./css/index.css">
        
        <link rel="stylesheet" href="./css/navBar.css">
    </head>


<body>

    <header>
        <div class="container" id="ContainerA">
            <div class="row align-items-center" id="ContainerA">
                <div class="col-4 d-flex align-items-center logo-container" id="ContainerB">
                    <a href="index.html">
                        <img src="./asset/Magaribyw.png" alt="Logo" class="logo">
                        <img src="./asset/Magarihover.png" alt="Logo Hover" class="logo-hover">
                    </a>
                </div>
    
                <div class="col-4 d-flex justify-content-center align-items-center" id="ContainerA">
                    <nav class="navbar navbar-expand-md justify-content-center" id="ContainerA">
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
            
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav">
                                <!-- LINKS -->
                            </ul>
                        </div>
                    </nav>
                </div>
    
                <div class="col-3 d-flex justify-content-end align-items-left" id="ContainerD">
                    <a id="AuthLink" href="login.html">
                        Iniciar sesión
                    </a>
                </div>
                <div class="col-1 d-flex justify-content-end align-items-left" id="ContainerE">
                    <li class="nav-item ms-3"> 
                        <a class="nav-link" href="#" id="abrirCarrito">
                            <i class="fas fa-shopping-cart"></i> 
                            <span id="carritoCantidad" class="badge bg-primary">0</span>
                        </a>
                    </li>
                </div>
            </div>
        </div>      
    </header>
    

    <main>
        <div class="d-flex justify-content-center align-items-center" style="height: 200px;">
            <div class="card" style="width: 450px;" >
                <h5 class="card-header">Inicio de sesión</h5>
    
                <div class="card-body">
                    <form action="./index.html" method="">
                        <div class="mb-3">
                            <label for="email">E-Mail</label>
                            <input type="email" name="email" id="emailLogin" placeholder="Ingrese su Email" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="pass">Contraseña</label>
                            <input type="password" name="pass" id="passwordLogin" class="form-control" required>
                        </div>
                        
                        
                        <input type="submit" value="Login"  id="btnLogin">
                    </form>
                </div>
            </div> 
        </div>
    </main>
    

    <script src="js/navBar.js"></script>
    <script src="js/login.js"></script>
    <script src="js/carrito.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>


</html>
