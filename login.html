<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

<body>

    <header>
        <div class="container" id="ContainerA">
           <div class="row align-items-center" id="ContainerA">
               <div class="col-4 d-flex align-items-center logo-container" id="ContainerB">
                  <a href="index.html">
                    <img src="./asset/Magaribyw.png" alt="Logo" class="logo">
                    <img src="./asset/Magarihover.png" alt="Logo Hover" class="logo-hover">
                  </a>
               </div>
  
               <div class="col-4 d-flex justify-content-center align-items-center" id="ContainerA">
                   <nav class="navbar navbar-expand-md justify-content-center" id="ContainerA">
                       <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                           <span class="navbar-toggler-icon"></span>
                       </button>
       
                       <div class="collapse navbar-collapse" id="navbarNav">
                           <ul class="navbar-nav">
                               <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                               <li class="nav-item"><a class="nav-link" href="categoria1.html">SmartPhone</a></li>
                               <li class="nav-item"><a class="nav-link" href="categoria2.html">Accesorios</a></li>
                               <li class="nav-item"><a class="nav-link" href="categoria3.html">Tecnología</a></li>
                           </ul>
                       </div>
                       
                   </nav>
               </div>
  
               <div class="col-4 d-flex justify-content-end align-items-left" id="ContainerB">
                   <a href="signup.html">
                       Registrarse
                   </a>
               </div>
           </div>
  
        </div>

    <main>
        <div class="d-flex justify-content-center align-items-center" style="height: 200px;">
            <div class="card" style="width: 450px;" >
                <h5 class="card-header">Inicio de sesión</h5>
    
                <div class="card-body">
                    <form action="./index.html" method="">
                        <div class="mb-3">
                            <label for="email">E-Mail</label>
                            <input type="email" name="email" id="emailLogin" placeholder="Ingrese su Email" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="pass">Contraseña</label>
                            <input type="password" name="pass" id="passwordLogin" class="form-control" required>
                        </div>
                        
                        
                        <input type="submit" value="Login"  id="btnLogin">
                    </form>
                </div>
            </div> 
        </div>
    </main>
    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="login.js"></script>
