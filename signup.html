<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Home - Magari</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/signup.css">

</head>


<body>

    <header>
        <div class="container" id="ContainerA">
            <div class="row align-items-center" id="ContainerA">
                <div class="col-4 d-flex align-items-center logo-container" id="ContainerB">
                    <a href="index.html">
                        <img src="./asset/Magaribyw.png" alt="Logo" class="logo">
                        <img src="./asset/Magarihover.png" alt="Logo Hover" class="logo-hover">
                    </a>
                </div>
    
                <div class="col-4 d-flex justify-content-center align-items-center" id="ContainerA">
                    <nav class="navbar navbar-expand-md justify-content-center" id="ContainerA">
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
            
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav">
                                <!-- LINKS -->
                            </ul>
                        </div>
                    </nav>
                </div>
    
                <div class="col-3 d-flex justify-content-end align-items-left" id="ContainerD">
                    <a href="login.html">
                        Iniciar sesión
                    </a>
                </div>
                <div class="col-1 d-flex justify-content-end align-items-left" id="ContainerE">
                    <li class="nav-item ms-3"> 
                        <a class="nav-link" href="#" id="abrirCarrito">
                            <i class="fas fa-shopping-cart"></i> 
                            <span id="carritoCantidad" class="badge bg-primary">0</span>
                        </a>
                    </li>
                </div>
            </div>
        </div>      
    </header>


     <section>
        <div class="d-flex justify-content-center align-items-center" style="height: 480px;">
            <div class="card" style="width: 550px;" id="tarjeta">
                <h2 class="card-header">Registro</h2>
                <div class="col d-flex align-items-center">
                    
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="Nombre">Nombre:</label>
                            <input type="text" name="Nombre" id="Nombre" placeholder="Ingrese su nombre" required >
                        </div>
    
                        <div class="mb-3">
                            <label for="Apellido" >Apellido:</label>
                            <input type="text" name="Apellido" id="Apellido" placeholder="Ingrese su apellido">
                        </div>
    
                        <div class="mb-3">
                            <label for="Email">E-Mail:</label>
                            <input type="email" name="Email" id="Email" placeholder="ejemplo@dominio.com">
                        </div>
    
                        <div class="mb-3">
                            <label for="FechaNac">Fecha de nacimiento:</label>
                            <input type="date" name="FechaNac" id="FechaNac">
                        </div>
    
                        <div class="mb-3">
                            <label for="Contraseña">Contraseña:</label>
                            <input type="password" name="Contraseña" id="Contraseña" placeholder="Ingrese una contraseña">
                        </div>
    
                        <input type="button" value="Registrarse" class="btn btn-secondary" id="Registrarse">
                    </div>
                </div>
            </div>
        </div>
     </section>
     <script type="module" src="./js/main.js"></script>
    <script src="./js/signup.js"></script>
</body>
</html>
