<body>
    <header>
                    
        <div class="container-fluid">
            <div class="row d-flex align-items-center justify-content-between">
                <div class="col-md-4">
                    <a href="./index.html"><img src="./asset/logo.png" alt="Logo" class="img-fluid"></a>
                    
                </div>
        
                <div class="col-md-6">
                    <nav class="navbar navbar-expand-md justify-content-center">
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
        
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav">
                                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

                            </ul>
                        </div>
                    </nav>
                </div>
        
                <div class="col-md-2 text-right">
                    <a href="login.html">Iniciar Sesión
                        <img src="./asset/login.png" alt="Login" class="login-icon">
                    </a>
                </div>
            </div>
        </div>
       
    </header>


    <form action="" method="post">

        <div>
            <label for="txtNombre">  <b>Nombre:</b>   </label>
            <br>
            <input type="text" id="txtNombre" name="txtNombre" class="" placeholder="Ingrese su nombre" required/>
            <br><br>
            <label for="txtApellido">  <b>Apellido:</b>   </label>
            <br>
            <input type="text" id="txtApellido" name="txtApellido" class="" placeholder="Ingrese su apellido" required/>
        </div>
    
        <div>
            <br>
            <label for="txtMail"> <b>Email:</b>  </label>
            <br>
            <input type="email" id="txtMail" name="txtMail" required/>
            <br><br>
            <label for="txtPass"> <b>Contraseña:</b> </label>
            <br>
            <input type="password" id="txtPass" name="txtPass" required/>
        </div>

        <div> 
            <br><br>
            <label for="fechaNac"> <b>Fecha de nacimiento:</b> </label>
            <input type="date" name="fechaNac" id="fechaNac" required/>
        </div>

        <div>
            <br><br>
            <input type="submit" value="Confirmar"/>
        </div>

        <input type="number" name="" id="">
    </form>
    
</body>
