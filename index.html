<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Home - Magari</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/navBar.css">
    <link rel="stylesheet" href="./css/cards.css">
    <link rel="stylesheet" href="./css/article-aside.css">
    <link rel="stylesheet" href="./css/carrito.css">
    <link rel="stylesheet" href="./css/productos.css">

    
</head>
<body>
   
    <!-- Contenedor para logo y barra de navegación -->
    <header>
      <div class="container" id="ContainerA">
          <div class="row align-items-center" id="ContainerA">
              <div class="col-4 d-flex align-items-center logo-container" id="ContainerB">
                  <a href="index.html">
                      <img src="./asset/Magaribyw.png" alt="Logo" class="logo">
                      <img src="./asset/Magarihover.png" alt="Logo Hover" class="logo-hover">
                  </a>
              </div>
  
              <div class="col-4 d-flex justify-content-center align-items-center" id="ContainerA">
                  <nav class="navbar navbar-expand-md justify-content-center" id="ContainerA">
                      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                          <span class="navbar-toggler-icon"></span>
                      </button>
          
                      <div class="collapse navbar-collapse" id="navbarNav">
                          <ul class="navbar-nav">
                              <!-- LINKS -->
                          </ul>
                      </div>
                  </nav>
              </div>
  
              <div class="col-3 d-flex justify-content-end align-items-left" id="ContainerD">
                  <a href="login.html">
                      Iniciar sesión
                  </a>
              </div>
              <div class="col-1 d-flex justify-content-end align-items-left" id="ContainerE">
                  <li class="nav-item ms-3"> 
                      <a class="nav-link" href="#" id="abrirCarrito">
                          <i class="fas fa-shopping-cart"></i> 
                          <span id="carritoCantidad" class="badge bg-primary">0</span>
                      </a>
                  </li>
              </div>
          </div>
      </div>      
  </header>

  <!-- Section Carrousel -->
     <section class="row" id="filas">
        <article class="col-md-8">
            <div id="carousel1" class="carousel slide carousel-fade" data-bs-ride="carousel">
                <div class="carousel-inner">
                  <div class="carousel-item active">
                    <img src="./asset/slide1.png" class="img-fluid d-block w-100" alt="Novedades de productos">
                  </div>
                  <div class="carousel-item">
                    <img src="./asset/slide2.png" class="img-fluid d-block w-100" alt="Novedades de productos">
                  </div>
                  <div class="carousel-item">
                    <img src="./asset/slide3.png" class="img-fluid d-block w-100" alt="Novedades de productos">
                  </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carousel1" data-bs-slide="prev">
                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carousel1" data-bs-slide="next">
                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Next</span>
                </button>
              </div>

        </article>

        <aside class="col-md-4" id="aside">
            <div id="carousel2" class="carousel slide carousel-fade" data-bs-ride="carousel">
                <div class="carousel-inner">
                  <div class="carousel-item active">
                    <img src="./asset/oferta1.png" class="img-fluid d-block w-100" alt="Productos en descuento">
                  </div>
                  <div class="carousel-item">
                    <img src="./asset/oferta2.png" class="img-fluid d-block w-100" alt="Productos en descuento">
                  </div>
                  <div class="carousel-item">
                    <img src="./asset/oferta3.png" class="img-fluid d-block w-100" alt="productos en descuento">
                  </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carousel2" data-bs-slide="prev">
                  <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carousel2" data-bs-slide="next">
                  <span class="carousel-control-next-icon" aria-hidden="true"></span>
                  <span class="visually-hidden">Next</span>
                </button>
              </div>    


        </aside>
     </section>

<!-- Section Productos -->
<section class="bloques row" id="productos">
    
        <div class="grid-Container" id="product-list">
           
           <!-- Productos -->
        </div>
   
</section>

   
   <footer class="row-footer">
    MagariStore® 2024 Todos los derechos resevados. 
   </footer>
    
   <script src="./js/index.js"></script>
   <script src="./js/producto.js"></script>
   <script src="./js/carrito.js"></script>
   <script src="./js/navbar.js"></script>
   <script src="./js/random.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
  
</body>
</html>
