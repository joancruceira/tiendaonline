<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Home - Magari</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/navBar.css">
    <link rel="stylesheet" href="./css/cards.css">
    <link rel="stylesheet" href="./css/carrito.css">

</head>
<body>

    <!-- Modal del carrito -->
    <div id="carritoModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="cerrar" onclick="document.getElementById('carritoModal').style.display='none'">&times;</span>
            <h2>Tus compras</h2>
            <div id="carritoItems"></div>
            <p id="carritoTotal">Total: $0</p>
            <button id="finalizarCompra">Finalizar Compra</button> <!-- Botón actualizado -->
        </div>
    </div>

    <header>
        <div class="container" id="ContainerA">
            <div class="row align-items-center" id="ContainerA">
                <div class="col-4 d-flex align-items-center logo-container" id="ContainerB">
                    <a href="index.html">
                        <img src="./asset/Magaribyw.png" alt="Logo" class="logo">
                        <img src="./asset/Magarihover.png" alt="Logo Hover" class="logo-hover">
                    </a>
                </div>
    
                <div class="col-4 d-flex justify-content-center align-items-center" id="ContainerA">
                    <nav class="navbar navbar-expand-md justify-content-center" id="ContainerA">
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
            
                        <div class="collapse navbar-collapse" id="navbarNav">
                            <ul class="navbar-nav">
                                <!-- LINKS -->
                            </ul>
                        </div>
                    </nav>
                </div>
    
                <div class="col-3 d-flex justify-content-end align-items-left" id="ContainerD">
                    <a href="login.html">
                        Iniciar sesión
                    </a>
                </div>
                <div class="col-1 d-flex justify-content-end align-items-left" id="ContainerE">
                    <li class="nav-item ms-3"> 
                        <a class="nav-link" href="#" id="abrirCarrito">
                            <i class="fas fa-shopping-cart"></i> 
                            <span id="carritoCantidad" class="badge bg-primary">0</span>
                        </a>
                    </li>
                </div>
            </div>
        </div>      
    </header>

    <section class="bloques row" id="productos">
    
        <div class="grid-Container" id="product-list">
            <!-- Aquí se agregarán dinámicamente los productos -->
        </div>
   
    </section>



    <script src="./js/index.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="./js/producto.js"></script>
    <script src="./js/carrito.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
